# ============================================================
# ACOE — Configuration File
# Autonomous Cost Optimization Engine
#
# ★ JUDGE GUIDE: Edit this file to tune system behavior.
# Changes here affect detection sensitivity, action thresholds,
# loop speed, and safety guardrails.
# ============================================================

# ── System ───────────────────────────────────────────────────
system:
  mode: AUTO                # AUTO = fully autonomous | APPROVAL = requires human sign-off
  demo_mode: true           # true = fixed seed (reproducible results), false = random
  random_seed: 42           # Seed used for deterministic anomaly scoring in demo mode

# ── Scheduler ────────────────────────────────────────────────
# Controls how often the autonomous pipeline re-runs
scheduler:
  interval_seconds: 60      # ★ EDIT: Time in seconds between autonomous cycles (default: 60s)
  max_backoff_seconds: 300   # Max wait time after pipeline failure (5 min)
  backoff_multiplier: 2.0    # Exponential backoff multiplier on failures
  max_consecutive_failures: 5 # Stop loop after 5 consecutive failures
  enable_partial_runs: true  # Allow running detect-only or decide-only sub-cycles

# ── Thresholds ───────────────────────────────────────────────
# ★ EDIT THESE to control how sensitive the detection engine is
# Lower thresholds = more aggressive detection (more issues found)
# Higher thresholds = more conservative (fewer issues flagged)
thresholds:
  saas_utilization_pct: 40       # ★ Flag SaaS if (active_users / total_licenses) < 40%
                                  #   Lower this (e.g. 30) for fewer flags
                                  #   Raise this (e.g. 60) for more aggressive flags
  cloud_utilization_pct: 35      # ★ Flag cloud resource if avg_usage < 35% of capacity
  sla_breach_window_hours: 48    # ★ Flag SLA if breach deadline is within 48 hours
  anomaly_z_score: 2.0           # ★ Flag spend as anomalous if z-score > 2.0 standard deviations
  duplicate_vendor_similarity: 0.85  # Flag vendor name as duplicate if 85%+ similar

# ── Decision Engine ──────────────────────────────────────────
# ★ EDIT THESE to control how conservatively/aggressively the AI acts
decision:
  min_confidence: 0.60       # ★ Only execute actions where AI confidence >= 60%
  max_risk: 0.70             # ★ Block execution if risk score > 70%
  time_horizon_months: 12    # Evaluation horizon for ROI calculations (12 months)
  roi_threshold: 1.0         # ★ Only recommend actions where ROI >= 1.0x (break-even)

# ── Execution Engine ─────────────────────────────────────────
# Controls how actions are executed
execution:
  approval_gate: false        # false = no human approval needed (fully autonomous)
                              # true = pause for human approval before each action
  max_retries: 3              # ★ How many times to retry a failed action
  retry_backoff_base: 2.0     # Seconds between retries (doubles each attempt: 2, 4, 8)
  idempotency_window_hours: 24 # Don't re-execute the same action within 24 hours

# ── Safety & Budget Guardrails ───────────────────────────────
# These limits protect against runaway automation
safety:
  max_actions_per_cycle: 50             # Hard cap: never execute more than 50 actions per run
  budget_cap_inr_per_cycle: 10000000    # ★ Hard cap: max INR 1 Crore impact per cycle
  min_infra_utilization_pct: 15         # Safety floor: never reduce cloud below 15% utilization
  critical_services:                     # ★ These services can NEVER be auto-cancelled
    - "Datadog"                           # Monitoring is critical — protected
    - "GitHub Enterprise"                 # Source code hosting — protected
    - "Microsoft 365"                     # Core productivity — protected
    - "Zendesk"                           # Customer support — protected
  max_downgrade_pct: 80                 # Cannot downgrade more than 80% of any license tier

# ── Circuit Breaker ──────────────────────────────────────────
# Prevents cascading failures — stops execution if too many errors occur
circuit_breaker:
  failure_threshold: 3        # Open circuit after 3 consecutive failures
  recovery_timeout_seconds: 120  # Wait 2 min before trying again (half-open state)
  half_open_max_calls: 1      # Test with 1 call before fully reopening

# ── Logging ──────────────────────────────────────────────────
logging:
  level: INFO                 # DEBUG | INFO | WARNING | ERROR
  json_logs: true             # Output structured JSON logs (useful for log aggregators)
  console_logs: true          # Also print to console
  log_dir: logs               # Directory where log files are written
  max_log_files: 100          # Rotate after 100 log files

# ── Database ─────────────────────────────────────────────────
# Stores idempotency records and execution state
database:
  type: sqlite               # sqlite = local file | json = flat JSON files
  path: state/acoe.db        # Path to SQLite database file

# ── REST API ─────────────────────────────────────────────────
# FastAPI server configuration (used by main.py)
api:
  host: "0.0.0.0"            # Listen on all interfaces (use "127.0.0.1" for local only)
  port: 8000                 # ★ API port — change if 8000 is already in use

# ── Prediction Module ────────────────────────────────────────
# Forecasts future savings based on historical cycles
prediction:
  enabled: true              # Enable/disable forecasting
  lookback_cycles: 10        # Use last 10 cycles for trend analysis
  forecast_horizon_months: 3 # Forecast 3 months ahead
  method: moving_average     # moving_average | linear_regression
