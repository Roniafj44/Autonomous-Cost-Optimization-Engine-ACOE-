# ============================================================
# ACOE — Configuration File
# Autonomous Cost Optimization Engine
# ============================================================

# ── System ───────────────────────────────────────────────────
system:
  mode: AUTO                # AUTO | APPROVAL
  demo_mode: true           # Deterministic outputs when true
  random_seed: 42

# ── Scheduler ────────────────────────────────────────────────
scheduler:
  interval_seconds: 60      # Pipeline cycle interval
  max_backoff_seconds: 300   # Max backoff on failure
  backoff_multiplier: 2.0
  max_consecutive_failures: 5
  enable_partial_runs: true  # Allow detect-only, etc.

# ── Thresholds ───────────────────────────────────────────────
thresholds:
  saas_utilization_pct: 40       # Flag if usage < 40%
  cloud_utilization_pct: 35      # Flag if usage < 35%
  sla_breach_window_hours: 48    # Flag if breach < 48h
  anomaly_z_score: 2.0           # Z-score cutoff
  duplicate_vendor_similarity: 0.85

# ── Decision ─────────────────────────────────────────────────
decision:
  min_confidence: 0.60
  max_risk: 0.70
  time_horizon_months: 12
  roi_threshold: 1.0             # Minimum ROI to act

# ── Execution ────────────────────────────────────────────────
execution:
  approval_gate: false
  max_retries: 3
  retry_backoff_base: 2.0
  idempotency_window_hours: 24

# ── Safety & Budget ──────────────────────────────────────────
safety:
  max_actions_per_cycle: 50
  budget_cap_inr_per_cycle: 10000000    # Max INR 1 Cr
  min_infra_utilization_pct: 15         # Cannot reduce below 15%
  critical_services:                     # Cannot auto-cancel
    - "Datadog"
    - "GitHub Enterprise"
    - "Microsoft 365"
    - "Zendesk"
  max_downgrade_pct: 80                 # Cannot downgrade >80% licenses

# ── Circuit Breaker ──────────────────────────────────────────
circuit_breaker:
  failure_threshold: 3        # Failures before opening
  recovery_timeout_seconds: 120
  half_open_max_calls: 1

# ── Logging ──────────────────────────────────────────────────
logging:
  level: INFO
  json_logs: true
  console_logs: true
  log_dir: logs
  max_log_files: 100

# ── Database ─────────────────────────────────────────────────
database:
  type: sqlite               # sqlite | json
  path: state/acoe.db

# ── API ──────────────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000

# ── Prediction ───────────────────────────────────────────────
prediction:
  enabled: true
  lookback_cycles: 10
  forecast_horizon_months: 3
  method: moving_average       # moving_average | linear_regression
